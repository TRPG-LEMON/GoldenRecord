<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃金唱片</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop">
        <div class="folder" id="golden-record-folder">
            <img src="https://img.icons8.com/ios/100/000000/folder-invoices.png" alt="folder icon">
            <span>黃金唱片分析結果</span>
        </div>
    </div>

    <div class="window" id="folder-window">
        <div class="title-bar">
            <div class="title">黃金唱片分析結果</div>
            <div class="close-button" id="close-folder-window">X</div>
        </div>
        <div class="content">
            <div class="file" id="analysis-file">
                <img src="https://img.icons8.com/material-outlined/48/000000/document.png" alt="file icon">
                <span>黃金唱片物質分析</span>
            </div>
            <div class="file" id="audio-file">
                <div>
                    <img src="https://img.icons8.com/material-outlined/48/000000/audio-file.png" alt="audio icon">
                </div>
                <span>語音檔</span>
            </div>
        </div>
    </div>

    <div class="window" id="terminal-window">
        <div class="title-bar">
            <div class="title">終端機</div>
            <div class="close-button" id="close-terminal-window">X</div>
        </div>
        <div class="content terminal-content" id="terminal-content">
        </div>
    </div>

    <div class="dialog" id="dialog-box">
        <div class="glitch-overlay" id="glitch-effect">ERROR<br/>SIGNAL LOST<br/>█▓▒░░▒▓█<br/>SYSTEM FAILURE</div>
        <div class="dialog-content">
            <p id="dialog-text"></p>
            <button id="next-dialog">繼續</button>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
